<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100svh;
        width: 100%;
        overflow: hidden;
      }

      .navbar,
      .footer {
        position: fixed;
        width: 100%;
        padding: 1em 3em;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .navbar {
        top: 0;
      }
      .footer {
        bottom: 0;
      }
      .container {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .item {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 100px;
        background-color: #b0b0b0;
        margin: 10px;
      }
      img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <p>PPM</p>
      <p>Menu</p>
    </div>
    <div class="footer">
      <p>Copyright 2024</p>
      <p>All rights reserved</p>
    </div>
    <div class="container">
      <div class="gallery">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const items = document.querySelectorAll(".item");
        const container = document.querySelector(".container");
        const numberOfItems = items.length;
        const angle = (2 * Math.PI) / numberOfItems;
        const radius = 300;
        let isGalleryOpen = false;

        const centerX = container.offsetWidth / 2;
        const centerY = container.offsetHeight / 2;

        const tl = gsap.timeline();

        items.forEach((item, index) => {
          const img = document.createElement("img");
          const idx = (index % 6) + 1;
          img.src = `../images/img${idx}.png`;
          item.appendChild(img);

          const angleOffset = index * angle;
          const initialRotation = (angleOffset * 180) / Math.PI - 90;
          const x = centerX + radius * Math.cos(angleOffset);
          const y = centerY + radius * Math.sin(angleOffset);

          gsap.set(item, { scale: 0 });

          tl.to(
            item,
            {
              left: x + "px",
              top: y + "px",
              rotation: initialRotation,
              scale: 1,
              duration: 1,
              ease: "power2.out",
              delay: 0.5,
            },
            index * 0.1,
          );

          item.addEventListener("click", () => {
            if (!isGalleryOpen) {
              isGalleryOpen = true;

              const duplicate = item.cloneNode(true);
              duplicate.style.position = "absolute";
              container.appendChild(duplicate);

              gsap.to(
                Array.from(items).filter((i) => i !== item),
                {
                  scale: 0,
                  duration: 0.5,
                  ease: "power2.in",
                  stagger: 0.05,
                },
              );

              const endRotation =
                initialRotation > 180 ? initialRotation - 360 : initialRotation;

              gsap.to([item, duplicate], {
                rotation: endRotation,
                duration: 0.0001,
                onComplete: () => {
                  gsap.to([item, duplicate], {
                    left: "50%",
                    top: "50%",
                    transform: "translate(-50%, -50%) scale(5)",
                    duration: 1,
                    ease: "power2.out",
                    delay: 1,
                  });
                },
              });

              const closeGallery = function () {
                if (isGalleryOpen) {
                  gsap.to([item, duplicate], {
                    left: x + "px",
                    top: y + "px",
                    scale: 1,
                    rotation: initialRotation,
                    duration: 1,
                    ease: "power2.in",
                    onComplete: () => {
                      duplicate.remove();
                      gsap.to(items, {
                        scale: 1,
                        duration: 1,
                        ease: "power2.out",
                        stagger: 0.05,
                      });
                      isGalleryOpen = false;
                    },
                  });
                }
              };
              item.addEventListener("click", closeGallery);
              duplicate.addEventListener("click", closeGallery);
            }
          });
        });
      });
    </script>
  </body>
</html>
