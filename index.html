<!doctype html>

      rel="stylesheet"

    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        background-color: #000;
      }
      .minimap {
        position: sticky;
        top: 0;
        width: 25%;
        height: 100svh;
        padding-top: 300px;
        overflow: hidden;
        background-color: #000;
        transition: 0.5s background-color;
      }
      .indicator {
        position: absolute;
        top: 300px;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 125px;
        border: 1.5px solid #fff;
        border-radius: 4px;
        mix-blend-mode: difference;
        z-index: 2;
      }
      .minimap-images {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .img {
        position: relative;
        width: 100px;
        height: 125px;
        padding: 10px;
        overflow: hidden;
      }
      .gallery {
        position: relative;
        top: 0;
        width: 75%;
      }

      .item {
        position: relative;
        width: 500px;
        height: 600px;
        overflow: hidden;
        margin: 50px auto;
      }

      .item-img {
        width: 500px;
        height: 550px;
      }

      .item-copy {
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 5px 0;
        text-transform: uppercase;
      }

      .container {
        width: 100%;
        height: 100%;
        background-color: #000;
      }
      .hero {
        height: 100svh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>

    <script src="https://unpkg.com/lenis@1.2.3/dist/lenis.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const lenis = new Lenis();

        function raf(time) {
          lenis.raf(time);
          requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        function mapRange(value, inMin, inMax, outMin, outMax) {
          return (
            ((value - inMin) * (outMax - outMin)) / (inMax - inMin) + outMin
          );
        }

        const gallery = document.querySelector(".gallery");
        const minimap = document.querySelector(".minimap");
        const minimapImages = document.querySelector(".minimap-images");

        function handleScroll() {
          const scrollY = window.scrollY;
          const translateY = mapRange(
            scrollY,
            0,
            gallery.scrollHeight,
            0,
            minimapImages.scrollHeight,
          );

          minimapImages.style.transform = `translateX(-50%) translateY(${-translateY}px)`;
        }

        window.addEventListener("scroll", handleScroll);
      });
    </script>
