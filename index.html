<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/lenis@1.2.3/dist/lenis.css"
    />
    <!-- <link rel="stylesheet" href="./style.css" /> -->
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background-color: #000;
      }

      img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .container {
        width: 100%;
        height: 100%;
      }

      h1 {
        color: #fff;
        font-size: 14vw;
        font-weight: 400;
        letter-spacing: -0.025em;
        text-transform: uppercase;
        text-align: center;
      }

      p {
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        text-transform: uppercase;
        text-align: center;
      }

      .intro-copy {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 0;
      }

      section {
        margin: 150vh 0;
      }

      .section-previews {
        position: fixed;
        width: 500px;
        height: 700px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .img {
        position: absolute;
        width: 100%;
        height: 100%;
        clip-path: polygon(0% 100%, 100% 100%, 100% 100%, 0% 100%);
        overflow: hidden;
      }

      .spacer {
        width: 100%;
        height: 200px;
      }

      @media (max-width: 900px) {
        .section-previews {
          width: 300px;
          height: 500px;
        }

        h1 {
          font-size: 18vw;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="intro-copy">
        <p>This message stays right here</p>
        <p>no matter where you go</p>
        <p>it won't move an inch</p>
        <p>even if you scroll up or down</p>
      </div>
      <div class="headers">
        <section id="section-1">
          <h1>Vaccum</h1>
        </section>
        <section id="section-2">
          <h1>Ember</h1>
        </section>
        <section id="section-3">
          <h1>Scratch</h1>
        </section>
        <section id="section-4">
          <h1>Azure</h1>
        </section>
        <section id="section-5">
          <h1>Synthesis</h1>
        </section>
        <section id="section-6">
          <h1>Euphoria</h1>
        </section>
        <section id="section-7">
          <h1>Nova</h1>
        </section>
        <div class="spacer"></div>
      </div>
      <div class="section-previews">
        <div class="img" id="preview-1">
          <img src="./images/img1.png" alt="" />
        </div>
        <div class="img" id="preview-2">
          <img src="./images/img2.png" alt="" />
        </div>
        <div class="img" id="preview-3">
          <img src="./images/img3.png" alt="" />
        </div>
        <div class="img" id="preview-4">
          <img src="./images/img4.png" alt="" />
        </div>
        <div class="img" id="preview-5">
          <img src="./images/img5.png" alt="" />
        </div>
        <div class="img" id="preview-6">
          <img src="./images/img6.png" alt="" />
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lenis@1.2.3/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        gsap.registerPlugin(ScrollTrigger);

        const lenis = new Lenis();

        lenis.on("scroll", ScrollTrigger.update);

        gsap.ticker.add((time) => {
          lenis.raf(time * 1000);
        });

        gsap.ticker.lagSmoothing(0);

        const sections = gsap.utils.toArray("section");

        sections.forEach((section, index) => {
          ScrollTrigger.create({
            trigger: section,
            start: "top center",
            end: "bottom bottom",
            markers: true,
          });
        });
      });
    </script>
  </body>
</html>
