<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100svh;
        width: 100%;
        overflow: hidden;
      }
      .container {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .item {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 100px;
        background-color: #ca1d1d;
      }
      img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="gallery">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const items = document.querySelectorAll(".item");
        const container = document.querySelector(".container");

        const totalItems = items.length;
        const angle = (2 * Math.PI) / totalItems;
        const radius = 300;

        const centerX = container.offsetWidth / 2;
        const centerY = container.offsetHeight / 2;

        items.forEach((item, index) => {
          const img = document.createElement("img");
          const idx = (index % 6) + 1;
          img.src = `../images/img${idx}.png`;
          item.appendChild(img);

          const angleOffset = index * angle;
          const initialRotation = (angleOffset * 180) / Math.PI - 90;
          const x = centerX + radius * Math.cos(angleOffset);
          const y = centerY + radius * Math.sin(angleOffset);

          gsap.set(item, { scale: 0 });

          gsap.to(
            item,
            {
              top: y + "px",
              left: x + "px",
              rotation: initialRotation,
              scale: 1,
              duration: 1,
              ease: "power3.out",
              delay: 0.5,
            },
            index * 0.1,
          );
        });
      });
    </script>
  </body>
</html>
